name: Daily Database Backup

on:
  schedule:
    - cron: '30 20 * * *'  # 8:30 PM UTC = 2:00 AM IST every day
  workflow_dispatch:        # allows manual trigger from GitHub Actions UI

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create and delete releases

    steps:
      - name: Export database via Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          DATE=$(date +%Y-%m-%d)
          echo "BACKUP_DATE=${DATE}" >> $GITHUB_ENV
          echo "BACKUP_FILE=cabflow-backup-${DATE}.json.gz" >> $GITHUB_ENV

          node << 'EOF'
          const https = require('https')
          const fs = require('fs')
          const zlib = require('zlib')

          const SUPABASE_URL = process.env.SUPABASE_URL
          const SERVICE_ROLE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY
          const DATE = process.env.DATE || new Date().toISOString().split('T')[0]

          function get(path) {
            return new Promise((resolve, reject) => {
              const url = new URL(path, SUPABASE_URL)
              const options = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                headers: {
                  'apikey': SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${SERVICE_ROLE_KEY}`,
                  'Accept': 'application/json'
                }
              }
              https.get(options, res => {
                let data = ''
                res.on('data', chunk => data += chunk)
                res.on('end', () => {
                  if (res.statusCode >= 400) reject(new Error(`HTTP ${res.statusCode}: ${data}`))
                  else resolve(JSON.parse(data))
                })
              }).on('error', reject)
            })
          }

          async function main() {
            // Discover tables from PostgREST OpenAPI spec
            const spec = await get('/rest/v1/')
            const tableList = Object.keys(spec.definitions || spec.components?.schemas || {})
              .filter(t => !t.endsWith('_relationships'))

            const backup = { exported_at: new Date().toISOString(), tables: {} }

            for (const table of tableList) {
              console.log(`Exporting table: ${table}`)
              try {
                const rows = await get(`/rest/v1/${table}?select=*&limit=100000`)
                backup.tables[table] = rows
                console.log(`  → ${rows.length} rows`)
              } catch (err) {
                console.warn(`  ✗ Skipped ${table}: ${err.message}`)
                backup.tables[table] = { error: err.message }
              }
            }

            const json = JSON.stringify(backup, null, 2)
            const compressed = zlib.gzipSync(json)
            fs.writeFileSync(`cabflow-backup-${DATE}.json.gz`, compressed)
            console.log(`\nBackup written: cabflow-backup-${DATE}.json.gz (${(compressed.length / 1024).toFixed(1)} KB)`)
          }

          main().catch(err => { console.error(err); process.exit(1) })
          EOF

      - name: Verify backup size
        run: |
          SIZE_BYTES=$(stat -c%s "cabflow-backup-${{ env.BACKUP_DATE }}.json.gz")
          if [ "$SIZE_BYTES" -lt 500 ]; then
            echo "ERROR: Backup file is only ${SIZE_BYTES} bytes — export likely failed"
            exit 1
          fi
          echo "Backup size: $(du -sh cabflow-backup-${{ env.BACKUP_DATE }}.json.gz | cut -f1)"

      - name: Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "backup-${{ env.BACKUP_DATE }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release already exists, replacing..."
            gh release delete "backup-${{ env.BACKUP_DATE }}" \
              --repo "${{ github.repository }}" \
              --yes \
              --cleanup-tag
          fi
          gh release create "backup-${{ env.BACKUP_DATE }}" \
            "${{ env.BACKUP_FILE }}" \
            --repo "${{ github.repository }}" \
            --title "DB Backup ${{ env.BACKUP_DATE }}" \
            --notes "Automated daily backup — CabFlow Supabase database" \
            --prerelease

      - name: Delete backups older than 7 days
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGS=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 100 \
            --json tagName \
            | jq -r '.[].tagName | select(startswith("backup-"))' \
            | sort -r \
            | tail -n +8)
          if [ -n "$TAGS" ]; then
            echo "Deleting old backups: $TAGS"
            echo "$TAGS" | xargs -I {} gh release delete {} \
              --repo "${{ github.repository }}" \
              --yes \
              --cleanup-tag
          else
            echo "No old backups to delete"
          fi
